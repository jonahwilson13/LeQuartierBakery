<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Le Quartier — Sales Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #EFE6D5; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + ReactDOM -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- prop-types (Recharts dependency) -->
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<!-- Recharts UMD build -->
<script crossorigin src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<!-- Babel standalone: lets the browser run our JSX file directly, no build step -->
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react" src="app.js"></script>
</body>
</html>
